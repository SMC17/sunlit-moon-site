<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="moon-clip">
      <circle cx="100" cy="100" r="75"/>
    </clipPath>
    <linearGradient id="light-bleed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7FDBFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#B85B3E" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Dark moon body -->
  <circle cx="100" cy="100" r="75" fill="#1A0F2E" stroke="none"/>
  <!-- Crescent shadow (subtract) -->
  <circle cx="125" cy="85" r="60" fill="#0F0F0F"/>
  <!-- Light bleeding through cracks -->
  <line x1="45" y1="65" x2="95" y2="75" stroke="#7FDBFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="90" x2="85" y2="95" stroke="#7FDBFF" stroke-width="1" opacity="0.4"/>
  <line x1="55" y1="115" x2="90" y2="120" stroke="#B85B3E" stroke-width="1.5" opacity="0.5"/>
  <line x1="48" y1="140" x2="80" y2="138" stroke="#7FDBFF" stroke-width="0.8" opacity="0.3"/>
  <!-- Crater marks (imperfection) -->
  <circle cx="65" cy="80" r="4" fill="none" stroke="#B85B3E" stroke-width="0.8" opacity="0.4"/>
  <circle cx="55" cy="110" r="6" fill="none" stroke="#B85B3E" stroke-width="0.6" opacity="0.3"/>
  <circle cx="70" cy="130" r="3" fill="none" stroke="#7FDBFF" stroke-width="0.7" opacity="0.35"/>
  <!-- Architectural fragment - brutalist element -->
  <rect x="35" y="155" width="30" height="4" fill="#B85B3E" opacity="0.5" transform="rotate(-5 50 157)"/>
  <rect x="30" y="162" width="20" height="2" fill="#7FDBFF" opacity="0.3"/>
</svg>